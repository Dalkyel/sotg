<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>La Sombra de los Dioses — Mapa Mental Caps. 1–12</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
</head>

<body>
  <header>
    <div>
      <div class="header-title">La Sombra de los Dioses</div>
      <div class="header-sub">Mapa Mental Interactivo · Capítulos 1–12</div>
    </div>
    <div class="legend">
      <div class="legend-item">
        <div class="legend-dot" style="background:#c03030"></div>Orka POV
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background:#c99030"></div>Varg POV
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background:#4a8cbf"></div>Elvar POV
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background:#9060b0"></div>Cosmología
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background:#4a9a6a"></div>Lugares
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background:#3a9a9a"></div>Vaesen & Magia
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background:#e07830"></div>Tramas
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background:#3a5a9a"></div>Facciones
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background:#7a3a3a"></div>Eventos
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background:#5a5a2a"></div>Objetos
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background:#6a2a6a"></div>Dioses
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background:#8a3a8a"></div>Magia
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background:#5a7a3a"></div>Cultura Nórdica
      </div>
    </div>
  </header>
  <div class="main">
    <div id="graph-container">
      <div class="rune-bg"></div>
      <svg id="graph"></svg>
      <div class="controls">
        <input type="text" id="search-input" placeholder="Buscar nodo..." aria-label="Buscar nodo">
        <button class="ctrl-btn" id="btn-zoom-in" title="Acercar" aria-label="Acercar">+</button>
        <button class="ctrl-btn" id="btn-zoom-out" title="Alejar" aria-label="Alejar">−</button>
        <button class="ctrl-btn" id="btn-reset" title="Restablecer vista" aria-label="Restablecer">⟳</button>
      </div>
    </div>
    <div id="detail-panel" class="hidden">
      <div class="panel-header" style="position:relative">
        <div class="panel-type" id="p-type">Personaje</div>
        <div class="panel-name" id="p-name">Nombre</div>
        <span class="panel-close" id="panel-close">✕</span>
      </div>
      <div class="panel-body">
        <div class="panel-desc" id="p-desc">Descripción</div>
        <div class="connections-title">Conexiones</div>
        <div id="p-connections"></div>
        <div id="p-star"></div>
      </div>
    </div>
  </div>
  <div class="tooltip" id="tooltip">
    <strong id="tt-name"></strong>
    <span id="tt-desc"></span>
  </div>

  <script src="data.js"></script>
  <script src="mapa.js"></script>
</body>
</body></html>
